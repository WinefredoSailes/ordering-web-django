{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content_anon %}
<div class="min-h-screen flex items-center justify-center px-4 py-8 bg-slate-50">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="text-5xl mb-3">⛽</div>
            <h1 class="text-2xl font-bold text-slate-800">Fuel<span class="text-blue-600">Portal</span></h1>
            <p class="text-sm text-slate-500 mt-1">Ordering &amp; Delivery Management</p>
        </div>
        <div class="card p-6">
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="label">Username</label>
                    <input type="text" name="username" required class="input" placeholder="Enter your username">
                </div>
                <div>
                    <label class="label">Password</label>
                    <input type="password" name="password" required class="input" placeholder="Enter your password">
                </div>
                {% if messages %}
                {% for msg in messages %}
                <div class="text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2 border border-red-200">{{ msg }}</div>
                {% endfor %}
                {% endif %}
                <button type="submit" id="loginBtn" class="btn-primary w-full justify-center py-2.5">
                    <span id="loginText">Sign In</span>
                    <svg id="loginSpinner" class="hidden animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </button>
            </form>
            <script>
                document.querySelector('form').addEventListener('submit', function() {
                    document.getElementById('loginText').textContent = 'Signing in...';
                    document.getElementById('loginSpinner').classList.remove('hidden');
                    document.getElementById('loginBtn').disabled = true;
                });
            </script>
        </div>
        <p class="text-center text-sm text-slate-500 mt-6">Don't have an account?
            <a href="{% url 'accounts:register' %}" class="text-blue-600 hover:text-blue-700 font-medium">Register</a>
        </p>
    </div>
</div>
{% endblock %}
