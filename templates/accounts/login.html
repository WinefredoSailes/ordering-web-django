{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content_anon %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white rounded-lg shadow-md p-8">
        <h1 class="text-2xl font-bold text-center mb-6">Fuel Ordering Portal</h1>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" required class="w-full border rounded-lg p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required class="w-full border rounded-lg p-2">
            </div>
            <button type="submit" id="loginBtn" class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700 flex items-center justify-center gap-2">
                <span id="loginText">Login</span>
                <svg id="loginSpinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
            </button>
        </form>
        <script>
            document.querySelector('form').addEventListener('submit', function() {
                document.getElementById('loginText').textContent = 'Logging in...';
                document.getElementById('loginSpinner').classList.remove('hidden');
                document.getElementById('loginBtn').disabled = true;
            });
        </script>
        <p class="text-center text-sm text-gray-500 mt-4">Don't have an account? <a href="{% url 'accounts:register' %}" class="text-blue-600 hover:underline">Register</a></p>
    </div>
</div>
{% endblock %}
