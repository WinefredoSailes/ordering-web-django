{% extends 'base.html' %}
{% block title %}Delete User{% endblock %}
{% block content %}
<div class="max-w-md mx-auto text-center">
    <div class="bg-white rounded-lg shadow p-8">
        <h1 class="text-2xl font-bold text-red-600 mb-4">Delete User</h1>
        <p class="text-gray-600 mb-6">Are you sure you want to delete <strong>{{ delete_user.username }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="flex justify-center gap-4">
                <a href="{% url 'accounts:user_list' %}" class="bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600">Cancel</a>
                <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700">Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
