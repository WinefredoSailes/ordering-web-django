{% extends 'base.html' %}
{% block title %}Delete User{% endblock %}
{% block content %}
<div class="max-w-md mx-auto text-center">
    <div class="card p-8">
        <h1 class="text-2xl font-bold text-red-500 mb-4">Delete User</h1>
        <p class="text-muted mb-6">Are you sure you want to delete <strong>{{ delete_user.username }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="flex justify-center gap-4">
                <a href="{% url 'accounts:user_list' %}" class="btn-secondary">Cancel</a>
                <button type="submit" class="btn-danger">Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
