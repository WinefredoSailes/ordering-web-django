{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content_anon %}
<div class="max-w-md mx-auto mt-8">
    <div class="card p-8">
        <h1 class="text-2xl font-bold text-center text-bright mb-6">Create Account</h1>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="label">Username</label>
                <input type="text" name="username" required class="input">
            </div>
            <div>
                <label class="label">Business Name</label>
                <input type="text" name="business_name" class="input" placeholder="Your company name">
            </div>
            <div>
                <label class="label">Email</label>
                <input type="email" name="email" class="input">
            </div>
            <div>
                <label class="label">Password</label>
                <input type="password" name="password1" required class="input">
            </div>
            <div>
                <label class="label">Confirm Password</label>
                <input type="password" name="password2" required class="input">
            </div>
            <div>
                <label class="label">Phone</label>
                <input type="text" name="phone" class="input">
            </div>
            <div>
                <label class="label">Address</label>
                <textarea name="address" rows="2" class="input"></textarea>
            </div>
            <button type="submit" class="w-full btn-primary justify-center">Register</button>
        </form>
        <p class="text-center text-sm text-muted mt-4">Already have an account? <a href="{% url 'accounts:login' %}" class="link">Login</a></p>
    </div>
</div>
{% endblock %}
