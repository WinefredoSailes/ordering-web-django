{% extends 'base.html' %}
{% block title %}{% if edit_user %}Edit{% else %}Create{% endif %} User{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">{% if edit_user %}Edit User{% else %}Create User{% endif %}</h1>
    <form method="post" class="bg-white rounded-lg shadow p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" name="username" value="{{ edit_user.username|default:'' }}" required class="w-full border rounded-lg p-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Business Name</label>
            <input type="text" name="business_name" value="{{ edit_user.business_name|default:'' }}" class="w-full border rounded-lg p-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password {% if edit_user %}(leave blank to keep){% endif %}</label>
            <input type="password" name="password" class="w-full border rounded-lg p-2" {% if not edit_user %}required{% endif %}>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
            <select name="role" required class="w-full border rounded-lg p-2">
                <option value="">Select...</option>
                <option value="customer" {% if edit_user.role == 'customer' %}selected{% endif %}>Customer</option>
                <option value="cashier" {% if edit_user.role == 'cashier' %}selected{% endif %}>Cashier</option>
                <option value="hauling" {% if edit_user.role == 'hauling' %}selected{% endif %}>Hauling</option>
                <option value="driver" {% if edit_user.role == 'driver' %}selected{% endif %}>Driver</option>
                <option value="superadmin" {% if edit_user.role == 'superadmin' %}selected{% endif %}>Superadmin</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Customer Group</label>
            <select name="customer_group" class="w-full border rounded-lg p-2">
                <option value="">None</option>
                {% for g in groups %}
                <option value="{{ g.id }}" {% if edit_user.customer_group_id == g.id %}selected{% endif %}>{{ g.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
            <input type="text" name="phone" value="{{ edit_user.phone|default:'' }}" class="w-full border rounded-lg p-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
            <textarea name="address" rows="2" class="w-full border rounded-lg p-2">{{ edit_user.address|default:'' }}</textarea>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700">{% if edit_user %}Update{% else %}Create{% endif %} User</button>
    </form>
</div>
{% endblock %}
