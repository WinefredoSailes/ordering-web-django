{% extends 'base.html' %}
{% block title %}Mark Delivered{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <div class="card card-body">
        <h1 class="text-2xl font-bold mb-4">Mark Delivered</h1>
        <p class="text-muted mb-4">Confirm delivery of <strong>{{ dispatch_order.order.po_number }}</strong>?</p>
        <form method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="label">Delivery Proof <span class="text-red-500">*</span></label>
                <input type="file" name="delivery_proof" accept="image/*" required class="input">
            </div>
            <div>
                <label class="label">Delivery Notes</label>
                <textarea name="delivery_notes" rows="3" class="input" placeholder="Any notes about the delivery..."></textarea>
            </div>
            <div class="flex flex-col sm:flex-row justify-center gap-2 sm:gap-4">
                <a href="{% url 'orders:driver_trips' %}" class="btn-secondary">Cancel</a>
                <button type="submit" class="btn-primary">Confirm Delivery</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
