{% extends 'base.html' %}
{% block title %}Mark Delivered{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold mb-4">Mark Delivered</h1>
        <p class="text-gray-600 mb-4">Confirm delivery of <strong>{{ dispatch_order.order.po_number }}</strong>?</p>
        <form method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Delivery Proof <span class="text-red-500">*</span></label>
                <input type="file" name="delivery_proof" accept="image/*" required class="w-full border rounded-lg p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Delivery Notes</label>
                <textarea name="delivery_notes" rows="3" class="w-full border rounded-lg p-2" placeholder="Any notes about the delivery..."></textarea>
            </div>
            <div class="flex flex-col sm:flex-row justify-center gap-2 sm:gap-4">
                <a href="{% url 'orders:driver_trips' %}" class="bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600">Cancel</a>
                <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700">Confirm Delivery</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
