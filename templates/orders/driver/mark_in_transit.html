{% extends 'base.html' %}
{% block title %}Mark In Transit{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <div class="card card-body text-center">
        <h1 class="text-2xl font-bold mb-4">Mark In Transit</h1>
        <p class="text-muted mb-6">Confirm you are transporting order <strong>{{ dispatch_order.order.po_number }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="flex flex-col sm:flex-row justify-center gap-2 sm:gap-4">
                <a href="{% url 'orders:driver_trips' %}" class="btn-secondary">Cancel</a>
                <button type="submit" class="btn-primary">Start Transport</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
