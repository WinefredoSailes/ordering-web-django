{% extends 'base.html' %}
{% block title %}Mark In Transit{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg shadow p-6 text-center">
        <h1 class="text-2xl font-bold mb-4">Mark In Transit</h1>
        <p class="text-gray-600 mb-6">Confirm you are transporting order <strong>{{ dispatch_order.order.po_number }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="flex flex-col sm:flex-row justify-center gap-2 sm:gap-4">
                <a href="{% url 'orders:driver_trips' %}" class="bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600">Cancel</a>
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">Start Transport</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
