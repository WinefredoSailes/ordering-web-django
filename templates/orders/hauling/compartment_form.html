{% extends 'base.html' %}
{% block title %}Add Compartment{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Add Compartment to {{ tanker.code }}</h1>
    <form method="post" class="bg-white rounded-lg shadow p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Compartment Number</label>
            <input type="number" name="number" required min="1" class="w-full border rounded-lg p-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Capacity (Liters)</label>
            <input type="number" name="capacity" value="2000" required min="1" class="w-full border rounded-lg p-2">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700">Add Compartment</button>
    </form>
</div>
{% endblock %}
