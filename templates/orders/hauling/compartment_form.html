{% extends 'base.html' %}
{% block title %}Add Compartment{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-white mb-6">Add Compartment to {{ tanker.code }}</h1>
    <form method="post" class="card space-y-4 p-6">
        {% csrf_token %}
        <div>
            <label class="label">Compartment Number</label>
            <input type="number" name="number" required min="1" class="input">
        </div>
        <div>
            <label class="label">Capacity (Liters)</label>
            <input type="number" name="capacity" value="2000" required min="1" class="input">
        </div>
        <button type="submit" class="btn-primary w-full justify-center">Add Compartment</button>
    </form>
</div>
{% endblock %}
