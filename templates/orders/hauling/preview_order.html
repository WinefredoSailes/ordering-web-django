{% extends 'base.html' %}
{% block title %}New Order{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
    <div class="card">
        <div class="card-body">
        <div class="flex items-center gap-3 mb-4">
            <a href="{% url 'orders:hauling_ops_chat' %}?with={{ conv.id }}" class="text-muted hover:text-bright">&larr; Back</a>
            <h1 class="text-xl font-bold text-slate-800">📦 New Order</h1>
        </div>
        <p class="text-sm text-muted mb-4">Customer: <strong class="text-slate-800">{{ conv.customer.business_name|default:conv.customer.username }}</strong></p>
        <form method="post">
            {% csrf_token %}
            <div class="space-y-3">
                <div>
                    <label class="label">Product</label>
                    <select name="product" required class="input">
                        <option value="">Select product...</option>
                        {% for p in products %}
                        <option value="{{ p.id }}" data-multiple="{{ p.order_multiple }}">{{ p.shortcut }} - {{ p.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="label">Quantity (Liters)</label>
                    <input type="number" name="quantity" min="500" step="500" required class="input">
                </div>
                <div>
                    <label class="label">Price per Liter <span class="text-muted">(leave blank for default)</span></label>
                    <input type="text" name="price" placeholder="{% if default_price %}₱{{ default_price }}{% else %}Default group price{% endif %}" class="input">
                </div>
                <div>
                    <label class="label">PO Number <span class="text-muted">(leave blank for auto)</span></label>
                    <input type="text" name="po_number" placeholder="Auto-generated" class="input">
                </div>
                <div>
                    <label class="label">Notes</label>
                    <textarea name="notes" rows="2" class="input"></textarea>
                </div>
            </div>
            <div class="flex gap-2 mt-6">
                <a href="{% url 'orders:hauling_ops_chat' %}?with={{ conv.id }}" class="btn-secondary flex-1 justify-center">Cancel</a>
                <button type="submit" class="btn-primary flex-1 justify-center" onclick="return confirm('Create this order?')">✅ Create Order</button>
            </div>
        </form>
        </div>
    </div>
</div>
{% endblock %}
