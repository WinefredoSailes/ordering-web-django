{% extends 'base.html' %}
{% block title %}New Order{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex items-center gap-3 mb-4">
            <a href="{% url 'orders:hauling_ops_chat' %}?with={{ conv.id }}" class="text-gray-500 hover:text-gray-700">&larr; Back</a>
            <h1 class="text-xl font-bold">📦 New Order</h1>
        </div>
        <p class="text-sm text-gray-500 mb-4">Customer: <strong>{{ conv.customer.business_name|default:conv.customer.username }}</strong></p>
        <form method="post">
            {% csrf_token %}
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Product</label>
                    <select name="product" required class="w-full border rounded-lg p-2 text-sm">
                        <option value="">Select product...</option>
                        {% for p in products %}
                        <option value="{{ p.id }}" data-multiple="{{ p.order_multiple }}">{{ p.shortcut }} - {{ p.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Quantity (Liters)</label>
                    <input type="number" name="quantity" min="500" step="500" required class="w-full border rounded-lg p-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Price per Liter <span class="text-gray-400">(leave blank for default)</span></label>
                    <input type="text" name="price" placeholder="{% if default_price %}₱{{ default_price }}{% else %}Default group price{% endif %}" class="w-full border rounded-lg p-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">PO Number <span class="text-gray-400">(leave blank for auto)</span></label>
                    <input type="text" name="po_number" placeholder="Auto-generated" class="w-full border rounded-lg p-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                    <textarea name="notes" rows="2" class="w-full border rounded-lg p-2 text-sm"></textarea>
                </div>
            </div>
            <div class="flex gap-2 mt-6">
                <a href="{% url 'orders:hauling_ops_chat' %}?with={{ conv.id }}" class="flex-1 text-center border border-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-50 text-sm">Cancel</a>
                <button type="submit" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm" onclick="return confirm('Create this order?')">✅ Create Order</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
