{% extends 'base.html' %}
{% block title %}Reply{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex items-center gap-3 mb-4">
            <a href="{% url 'orders:hauling_ops_chat' %}?with={{ conv.id }}" class="text-gray-500 hover:text-gray-700">&larr; Back</a>
            <h1 class="text-xl font-bold">💬 Reply to Customer</h1>
        </div>
        <p class="text-sm text-gray-500 mb-4">Customer: <strong>{{ conv.customer.business_name|default:conv.customer.username }}</strong></p>
        <form method="post">
            {% csrf_token %}
            <div>
                <textarea name="content" rows="4" placeholder="Type your reply here..." required class="w-full border rounded-lg p-2 text-sm"></textarea>
            </div>
            <div class="flex gap-2 mt-4">
                <a href="{% url 'orders:hauling_ops_chat' %}?with={{ conv.id }}" class="flex-1 text-center border border-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-50 text-sm">Cancel</a>
                <button type="submit" class="flex-1 bg-gray-700 text-white px-4 py-2 rounded-lg hover:bg-gray-800 text-sm">Send Reply</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
