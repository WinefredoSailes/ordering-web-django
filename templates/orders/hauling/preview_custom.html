{% extends 'base.html' %}
{% block title %}Reply{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
    <div class="card">
        <div class="card-body">
        <div class="flex items-center gap-3 mb-4">
            <a href="{% url 'orders:hauling_ops_chat' %}?with={{ conv.id }}" class="text-muted hover:text-bright">&larr; Back</a>
            <h1 class="text-xl font-bold text-slate-800">💬 Reply to Customer</h1>
        </div>
        <p class="text-sm text-muted mb-4">Customer: <strong class="text-slate-800">{{ conv.customer.business_name|default:conv.customer.username }}</strong></p>
        <form method="post">
            {% csrf_token %}
            <div>
                <textarea name="content" rows="4" placeholder="Type your reply here..." required class="input"></textarea>
            </div>
            <div class="flex gap-2 mt-4">
                <a href="{% url 'orders:hauling_ops_chat' %}?with={{ conv.id }}" class="btn-secondary flex-1 justify-center">Cancel</a>
                <button type="submit" class="btn-primary flex-1 justify-center">Send Reply</button>
            </div>
        </form>
        </div>
    </div>
</div>
{% endblock %}
