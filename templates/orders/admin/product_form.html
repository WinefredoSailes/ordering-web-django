{% extends 'base.html' %}
{% block title %}{% if product %}Edit{% else %}Create{% endif %} Product{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-slate-800 mb-6">{% if product %}Edit{% else %}Create{% endif %} Product</h1>
    <form method="post" class="card space-y-4 p-6">
        {% csrf_token %}
        <div>
            <label class="label">Shortcut</label>
            <select name="shortcut" required class="input">
                <option value="ADO" {% if product.shortcut == 'ADO' %}selected{% endif %}>ADO - Diesel</option>
                <option value="REG" {% if product.shortcut == 'REG' %}selected{% endif %}>REG - Regular</option>
                <option value="XCS" {% if product.shortcut == 'XCS' %}selected{% endif %}>XCS - Premium</option>
            </select>
        </div>
        <div>
            <label class="label">Full Name</label>
            <input type="text" name="name" value="{{ product.name|default:'' }}" required class="input">
        </div>
        <div>
            <label class="label">Description</label>
            <textarea name="description" rows="2" class="input">{{ product.description|default:'' }}</textarea>
        </div>
        <div>
            <label class="label">Order Multiple (Liters)</label>
            <input type="number" name="order_multiple" value="{{ product.order_multiple|default:'500' }}" required min="1" class="input">
        </div>
        {% if product %}
        <div>
            <label class="flex items-center">
                <input type="checkbox" name="is_active" {% if product.is_active %}checked{% endif %} class="mr-2">
                <span class="label" style="text-transform:none;letter-spacing:0">Active</span>
            </label>
        </div>
        {% endif %}
        <button type="submit" class="btn-primary w-full justify-center">{% if product %}Update{% else %}Create{% endif %}</button>
    </form>
</div>
{% endblock %}
