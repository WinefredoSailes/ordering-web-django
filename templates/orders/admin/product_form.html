{% extends 'base.html' %}
{% block title %}{% if product %}Edit{% else %}Create{% endif %} Product{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">{% if product %}Edit{% else %}Create{% endif %} Product</h1>
    <form method="post" class="bg-white rounded-lg shadow p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Shortcut</label>
            <select name="shortcut" required class="w-full border rounded-lg p-2">
                <option value="ADO" {% if product.shortcut == 'ADO' %}selected{% endif %}>ADO - Diesel</option>
                <option value="REG" {% if product.shortcut == 'REG' %}selected{% endif %}>REG - Regular</option>
                <option value="XCS" {% if product.shortcut == 'XCS' %}selected{% endif %}>XCS - Premium</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
            <input type="text" name="name" value="{{ product.name|default:'' }}" required class="w-full border rounded-lg p-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea name="description" rows="2" class="w-full border rounded-lg p-2">{{ product.description|default:'' }}</textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Order Multiple (Liters)</label>
            <input type="number" name="order_multiple" value="{{ product.order_multiple|default:'500' }}" required min="1" class="w-full border rounded-lg p-2">
        </div>
        {% if product %}
        <div>
            <label class="flex items-center">
                <input type="checkbox" name="is_active" {% if product.is_active %}checked{% endif %} class="mr-2">
                <span class="text-sm font-medium text-gray-700">Active</span>
            </label>
        </div>
        {% endif %}
        <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700">{% if product %}Update{% else %}Create{% endif %}</button>
    </form>
</div>
{% endblock %}
