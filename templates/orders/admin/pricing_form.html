{% extends 'base.html' %}
{% block title %}{% if pricing %}Edit{% else %}Create{% endif %} Pricing{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-white mb-6">{% if pricing %}Edit{% else %}Create{% endif %} Pricing</h1>
    <form method="post" class="card space-y-4 p-6">
        {% csrf_token %}
        <div>
            <label class="label">Product</label>
            <select name="product" required class="input">
                {% for p in products %}
                <option value="{{ p.id }}" {% if pricing.product_id == p.id %}selected{% endif %}>{{ p.shortcut }} - {{ p.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="label">Customer Group (optional)</label>
            <select name="customer_group" class="input">
                <option value="">All groups</option>
                {% for g in groups %}
                <option value="{{ g.id }}" {% if pricing.customer_group_id == g.id %}selected{% endif %}>{{ g.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="label">Specific Customer (optional, overrides group)</label>
            <select name="customer" class="input">
                <option value="">All customers</option>
                {% for c in customers %}
                <option value="{{ c.id }}" {% if pricing.customer_id == c.id %}selected{% endif %}>{{ c.username }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="label">Price per Liter (₱)</label>
            <input type="number" name="price_per_liter" value="{{ pricing.price_per_liter|default:'' }}" step="0.01" required class="input">
        </div>
        {% if pricing %}
        <div>
            <label class="flex items-center">
                <input type="checkbox" name="is_active" {% if pricing.is_active %}checked{% endif %} class="mr-2">
                <span class="label" style="text-transform:none;letter-spacing:0">Active</span>
            </label>
        </div>
        {% endif %}
        <button type="submit" class="btn-primary w-full justify-center">{% if pricing %}Update{% else %}Create{% endif %} Pricing</button>
    </form>
</div>
{% endblock %}
