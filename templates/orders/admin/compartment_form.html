{% extends 'base.html' %}

{% block title %}Add Compartment{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="mb-6">
        <a href="{% url 'orders:truck_detail' truck.pk %}" class="link">← Back</a>
    </div>
    
    <div class="card p-6">
        <h1 class="text-xl font-bold text-white mb-4">Add Compartment to {{ truck.truck_number }}</h1>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="label">Compartment Number</label>
                <input type="number" name="compartment_number" required class="input w-full">
            </div>
            <div>
                <label class="label">Capacity (Liters)</label>
                <input type="number" name="capacity_liters" required value="2000" class="input w-full">
            </div>
            <button type="submit" class="btn-primary w-full">
                Add Compartment
            </button>
        </form>
    </div>
</div>
{% endblock %}
