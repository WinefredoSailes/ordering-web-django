{% extends 'base.html' %}
{% block title %}{% if group %}Edit{% else %}Create{% endif %} Group{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">{% if group %}Edit{% else %}Create{% endif %} Group</h1>
    <form method="post" class="bg-white rounded-lg shadow p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text" name="name" value="{{ group.name|default:'' }}" required class="w-full border rounded-lg p-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea name="description" rows="2" class="w-full border rounded-lg p-2">{{ group.description|default:'' }}</textarea>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700">{% if group %}Update{% else %}Create{% endif %}</button>
    </form>
</div>
{% endblock %}
