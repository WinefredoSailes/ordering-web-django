{% extends 'base.html' %}
{% block title %}{% if group %}Edit{% else %}Create{% endif %} Group{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-slate-800 mb-6">{% if group %}Edit{% else %}Create{% endif %} Group</h1>
    <form method="post" class="card space-y-4 p-6">
        {% csrf_token %}
        <div>
            <label class="label">Name</label>
            <input type="text" name="name" value="{{ group.name|default:'' }}" required class="input">
        </div>
        <div>
            <label class="label">Description</label>
            <textarea name="description" rows="2" class="input">{{ group.description|default:'' }}</textarea>
        </div>
        <button type="submit" class="btn-primary w-full justify-center">{% if group %}Update{% else %}Create{% endif %}</button>
    </form>
</div>
{% endblock %}
