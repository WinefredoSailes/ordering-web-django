{% extends 'base.html' %}
{% block title %}Customer Groups{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Customer Groups</h1>
        <a href="{% url 'orders:group_create' %}" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Add Group</a>
    </div>
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Description</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th></tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                {% for g in groups %}
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap">{{ g.name }}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">{{ g.description|default:'-' }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        <a href="{% url 'orders:group_edit' g.pk %}" class="text-yellow-600 hover:text-yellow-900 mr-3">Edit</a>
                        <a href="{% url 'orders:group_delete' g.pk %}" class="text-red-600 hover:text-red-900" onclick="return confirm('Delete this customer group? This action cannot be undone.')">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        </div>
    </div>
</div>
{% endblock %}
