{% extends 'base.html' %}
{% block title %}Customer Groups{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-white">Customer Groups</h1>
        <a href="{% url 'orders:group_create' %}" class="btn-primary">Add Group</a>
    </div>
    <div class="card">
        <div class="table-wrap">
        <table>
            <thead>
                <tr><th>Name</th><th>Description</th><th>Actions</th></tr>
            </thead>
            <tbody>
                {% for g in groups %}
                <tr>
                    <td class="whitespace-nowrap">{{ g.name }}</td>
                    <td class="text-muted">{{ g.description|default:'-' }}</td>
                    <td class="whitespace-nowrap">
                        <a href="{% url 'orders:group_edit' g.pk %}" class="link mr-3">Edit</a>
                        <a href="{% url 'orders:group_delete' g.pk %}" class="link" onclick="return confirm('Delete this customer group? This action cannot be undone.')">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        </div>
    </div>
</div>
{% endblock %}
