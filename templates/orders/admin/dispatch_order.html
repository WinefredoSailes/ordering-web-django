{% extends 'base.html' %}

{% block title %}Dispatch Order - {{ order.po_number }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-6">
        <a href="{% url 'orders:admin_orders' %}" class="link">← Back</a>
    </div>
    
    <div class="card p-6">
        <h1 class="text-2xl font-bold text-slate-800 mb-6">Dispatch Order</h1>
        
        <div class="grid md:grid-cols-2 gap-4 mb-6">
            <div>
                <p class="text-muted">PO Number</p>
                <p class="text-lg font-semibold text-bright">{{ order.po_number }}</p>
            </div>
            <div>
                <p class="text-muted">Product</p>
                <p class="text-lg font-semibold text-bright">{{ order.product.name }}</p>
            </div>
            <div>
                <p class="text-muted">Quantity</p>
                <p class="text-lg font-semibold text-bright">{{ order.quantity_liters }} Liters</p>
            </div>
        </div>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="label">Select Truck</label>
                <select name="truck" id="truckSelect" required class="input w-full">
                    <option value="">-- Select Truck --</option>
                    {% for truck in trucks %}
                    <option value="{{ truck.id }}">{{ truck.truck_number }} - {{ truck.plate_number }} ({{ truck.total_capacity_liters }}L, {{ truck.compartments_count }} comp)</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label class="label">Select Compartment</label>
                <select name="compartment" id="compartmentSelect" required class="input w-full">
                    <option value="">-- Select Compartment --</option>
                </select>
            </div>
            
            <div>
                <label class="label">Select Driver</label>
                <select name="driver" required class="input w-full">
                    <option value="">-- Select Driver --</option>
                    {% for driver in drivers %}
                    <option value="{{ driver.id }}">{{ driver.username }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <button type="submit" class="btn-primary w-full" onclick="return confirm('Dispatch {{ order.po_number }}? This will assign a driver and truck.')">
                Dispatch Order
            </button>
        </form>
    </div>
</div>

<script>
const truckData = {};
{% for truck in trucks %}
truckData[{{ truck.id }}] = [
    {% for comp in truck.compartments.all %}
    {id: {{ comp.id }}, number: {{ comp.compartment_number }}, capacity: {{ comp.capacity_liters }}},
    {% endfor %}
];
{% endfor %}

document.getElementById('truckSelect').addEventListener('change', function() {
    const select = document.getElementById('compartmentSelect');
    select.innerHTML = '<option value="">-- Select Compartment --</option>';
    const compartments = truckData[this.value] || [];
    compartments.forEach(function(comp) {
        const opt = document.createElement('option');
        opt.value = comp.id;
        opt.textContent = 'Compartment ' + comp.number + ' (' + comp.capacity + 'L)';
        select.appendChild(opt);
    });
});
</script>
{% endblock %}
