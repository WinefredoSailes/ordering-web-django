{% extends 'base.html' %}

{% block title %}{% if truck %}Edit{% else %}Add{% endif %} Truck{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="mb-6">
        <a href="{% url 'orders:truck_list' %}" class="link">← Back</a>
    </div>
    
    <div class="card p-6">
        <h1 class="text-xl font-bold text-slate-800 mb-4">{% if truck %}Edit{% else %}Add{% endif %} Truck</h1>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="label">Truck Number</label>
                <input type="text" name="truck_number" required value="{{ truck.truck_number|default:'' }}" class="input w-full">
            </div>
            <div>
                <label class="label">Plate Number</label>
                <input type="text" name="plate_number" required value="{{ truck.plate_number|default:'' }}" class="input w-full">
            </div>
            <div>
                <label class="label">Total Capacity (Liters)</label>
                <input type="number" name="total_capacity_liters" required value="{{ truck.total_capacity_liters|default:'10000' }}" class="input w-full">
            </div>
            <div>
                <label class="label">Compartments Count</label>
                <input type="number" name="compartments_count" required value="{{ truck.compartments_count|default:'6' }}" class="input w-full">
            </div>
            {% if truck %}
            <div class="flex items-center gap-2">
                <input type="checkbox" name="is_active" id="is_active" {% if truck.is_active %}checked{% endif %}>
                <label for="is_active">Active</label>
            </div>
            {% endif %}
            <button type="submit" class="btn-primary w-full">
                Save
            </button>
        </form>
    </div>
</div>
{% endblock %}
