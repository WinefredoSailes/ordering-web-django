{% extends 'base.html' %}
{% block title %}{% if driver %}Edit{% else %}Create{% endif %} Driver{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-slate-800 mb-6">{% if driver %}Edit{% else %}Create{% endif %} Driver</h1>
    <form method="post" class="card space-y-4 p-6">
        {% csrf_token %}
        {% if not driver %}
        <div>
            <label class="label">User</label>
            <select name="user" required class="input">
                <option value="">Select user...</option>
                {% for u in users %}
                <option value="{{ u.id }}">{{ u.username }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
        <div>
            <label class="label">Phone</label>
            <input type="text" name="phone" value="{{ driver.phone|default:'' }}" class="input">
        </div>
        <div>
            <label class="label">License Number</label>
            <input type="text" name="license_number" value="{{ driver.license_number|default:'' }}" class="input">
        </div>
        <div>
            <label class="label">License Expiry</label>
            <input type="date" name="license_expiry" value="{{ driver.license_expiry|date:'Y-m-d'|default:'' }}" class="input">
        </div>
        {% if driver %}
        <div>
            <label class="flex items-center">
                <input type="checkbox" name="is_available" {% if driver.is_available %}checked{% endif %} class="mr-2">
                <span class="label" style="text-transform:none;letter-spacing:0">Available</span>
            </label>
        </div>
        {% endif %}
        <button type="submit" class="btn-primary w-full justify-center">{% if driver %}Update{% else %}Create{% endif %} Driver</button>
    </form>
</div>
{% endblock %}
