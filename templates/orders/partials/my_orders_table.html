{% if orders %}
{% for order in orders %}
<tr class="hover:">
    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-bright">{{ order.po_number }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-muted">{{ order.product.shortcut }} - {{ order.product.name }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-muted">{{ order.quantity_liters }} L</td>
    <td class="px-6 py-4 whitespace-nowrap">
        <span class="badge
            {% if order.status == 'pending_payment' %}badge-yellow
            {% elif order.status == 'payment_uploaded' %}badge-blue
            {% elif order.status == 'approved' %}badge-green
            {% elif order.status == 'rejected' %}badge-red
            {% elif order.status == 'dispatched' %}badge-purple
            {% elif order.status == 'in_transit' %}badge-indigo
            {% elif order.status == 'delivered' %}badge-green{% endif %}">
            {{ order.get_status_display }}
        </span>
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-muted">{{ order.created_at|date:"M d, Y" }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm">
        <a href="{% url 'orders:order_detail' order.pk %}" class="link">View</a>
    </td>
</tr>
{% endfor %}
{% else %}
<tr>
    <td colspan="6" class="px-6 py-8 text-center text-muted">No orders yet. <a href="{% url 'orders:products' %}" class="link">Place your first order</a></td>
</tr>
{% endif %}
