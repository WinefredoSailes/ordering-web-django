{% if orders %}
{% for order in orders %}
<tr class="hover:bg-gray-50">
    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ order.po_number }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ order.product.shortcut }} - {{ order.product.name }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ order.quantity_liters }} L</td>
    <td class="px-6 py-4 whitespace-nowrap">
        <span class="px-2 py-1 text-xs font-semibold rounded-full
            {% if order.status == 'pending_payment' %}bg-yellow-100 text-yellow-800
            {% elif order.status == 'payment_uploaded' %}bg-blue-100 text-blue-800
            {% elif order.status == 'approved' %}bg-green-100 text-green-800
            {% elif order.status == 'rejected' %}bg-red-100 text-red-800
            {% elif order.status == 'dispatched' %}bg-purple-100 text-purple-800
            {% elif order.status == 'in_transit' %}bg-indigo-100 text-indigo-800
            {% elif order.status == 'delivered' %}bg-green-100 text-green-800{% endif %}">
            {{ order.get_status_display }}
        </span>
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ order.created_at|date:"M d, Y" }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm">
        <a href="{% url 'orders:order_detail' order.pk %}" class="text-blue-600 hover:text-blue-900">View</a>
    </td>
</tr>
{% endfor %}
{% else %}
<tr>
    <td colspan="6" class="px-6 py-8 text-center text-gray-500">No orders yet. <a href="{% url 'orders:products' %}" class="text-blue-600 hover:underline">Place your first order</a></td>
</tr>
{% endif %}
